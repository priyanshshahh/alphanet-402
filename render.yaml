# One-click deploy: https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: signalrelay
    runtime: docker
    plan: free
    rootDir: polymarket-sentiment-agent
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: X402_PAY_TO
        value: "0x5190715b3aFd1076b1416F20e7E64F53B90e054e"
      - key: FRONTEND_DIST
        value: /app/frontend_dist
      - key: TRADING_MODE
        value: PAPER
      - key: DATABASE_URL
        value: sqlite:////tmp/doa.db
