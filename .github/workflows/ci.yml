name: CI

on:
  push:
    branches: [main, diverge-equities]
  pull_request:

jobs:
  backend:
    name: Lint + tests (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alphanet-core/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: alphanet-core/backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check .
      - name: Tests (offline)
        run: pytest tests -q

  frontend:
    name: Build (Command Center)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alphanet-core/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: alphanet-core/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
